@if (paginatedMembers(); as paginatedResults) {
  <div class="flex flex-col w-full">
    <div class="flex justify-between items-center">
      <div class="flex gap-3">
        <button class="btn btn-primary" (click)="openModal()">Select Filters</button>
        <button class="btn btn-neutral" (click)="resetFilters()">Reset Filters</button>
      </div>
      @if (paginatedResults.metadata; as metadata) {
        <app-paginator
          [pageNumber]="metadata.currentPage"
          [pageSize]="metadata.pageSize"
          [totalCount]="metadata.totalCount"
          [totalPages]="metadata.totalPages"
          (pageChange)="onPageChange($event)"
        />
      }
    </div>
    @let members = paginatedResults?.items;
    @if (members) {
      <div class="grid grid-cols-5 gap-6">
        @for (member of members; track member.id) {
          <app-member-card [member]="member" />
        }
      </div>
    }
  </div>
}

<app-filter-modal
  #filterModal
  [hidden]="!paginatedMembers()"
  (closeModal)="onClose()"
  (submitData)="onFilterChange($event)"
/>
